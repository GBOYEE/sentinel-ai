# Sentinel AI nginx configuration
# Place this in /etc/nginx/sites-available/sentinel-ai and symlink to sites-enabled

server {
    listen 80;
    server_name _;  # catch-all; change to your domain if you have one

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dashboard (Streamlit) on subpath /dashboard
    location /dashboard/ {
        proxy_pass http://127.0.0.1:8501/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
